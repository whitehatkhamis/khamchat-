<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KhamChat</title>
<style>
body{
margin:0;
font-family:Arial;
background:#ece5dd;
}
.header{
background:#25D366;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
.tabs{
display:flex;
justify-content:space-around;
background:white;
padding:10px;
}
.tab{
cursor:pointer;
}
#chatArea{
height:70vh;
overflow-y:auto;
padding:10px;
}
.message{
background:white;
padding:10px;
margin:10px;
border-radius:10px;
max-width:70%;
}
.me{
background:#DCF8C6;
margin-left:auto;
}
.bottom{
display:flex;
padding:10px;
background:white;
position:fixed;
bottom:0;
width:100%;
}
.bottom input{
flex:1;
padding:10px;
}
.bottom button{
padding:10px;
}
#setup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
img{
max-width:200px;
border-radius:10px;
margin-top:5px;
}
.small{
font-size:12px;
color:gray;
}
</style>
</head>
<body>

<div id="setup">
<h2>Setup Profile</h2>
<input id="username" placeholder="Username">
<input type="file" id="profilePic">
<button onclick="saveProfile()">Start</button>
</div>

<div class="header">
<h1>KhamChat</h1>
<div>
📷 🔍 ⋮
</div>
</div>

<div class="tabs">
<div class="tab">Chats</div>
<div class="tab">Updates</div>
<div class="tab">Calls</div>
</div>

<div id="typing"></div>
<div id="chatArea"></div>

<div class="bottom">
<input id="messageInput" placeholder="Type message...">
<input type="file" id="imageInput">
<button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
serverTimestamp,
query,
orderBy,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyAsFeKfeYTIGzP221hwPlFBHPiYyy-TLqE",
authDomain: "khamchat-1d5a4.firebaseapp.com",
projectId: "khamchat-1d5a4",
storageBucket: "khamchat-1d5a4.firebasestorage.app",
messagingSenderId: "515176934851",
appId: "1:515176934851:web:4ec261196d1ff497666176"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let username = localStorage.getItem("username");
let profile = localStorage.getItem("profile");

if(username){
document.getElementById("setup").style.display="none";
}

window.saveProfile = function(){
username = document.getElementById("username").value;
localStorage.setItem("username", username);
document.getElementById("setup").style.display="none";
};

const messagesRef = collection(db,"messages");
const callsRef = collection(db,"calls");
const statusRef = collection(db,"status");

window.sendMessage = async function(){

let text = document.getElementById("messageInput").value;
let file = document.getElementById("imageInput").files[0];

let imageUrl = "";

if(file){
const storageRef = ref(storage,"images/"+Date.now());
await uploadBytes(storageRef,file);
imageUrl = await getDownloadURL(storageRef);
}

await addDoc(messagesRef,{
username:username,
text:text,
image:imageUrl,
time:serverTimestamp(),
seen:false,
edited:false
});

document.getElementById("messageInput").value="";
};

const q = query(messagesRef, orderBy("time"));

onSnapshot(q,(snapshot)=>{
let area = document.getElementById("chatArea");
area.innerHTML="";

snapshot.forEach((docSnap)=>{
let data = docSnap.data();

let div = document.createElement("div");
div.className="message";

if(data.username===username){
div.classList.add("me");
}

div.innerHTML=`
<b>${data.username}</b><br>
${data.text || ""}
${data.image ? `<img src="${data.image}">` : ""}
<div class="small">
${data.seen ? "✓✓ Seen" : "✓ Sent"}
${data.edited ? "(edited)" : ""}
</div>
<button onclick="editMessage('${docSnap.id}')">Edit</button>
<button onclick="deleteMessage('${docSnap.id}')">Delete</button>
`;

area.appendChild(div);

if(data.username!==username && !data.seen){
updateDoc(doc(db,"messages",docSnap.id),{
seen:true
});
}
});

area.scrollTop=area.scrollHeight;
});

window.deleteMessage = async function(id){
await deleteDoc(doc(db,"messages",id));
};

window.editMessage = async function(id){
let newText = prompt("Edit message:");
if(newText){
await updateDoc(doc(db,"messages",id),{
text:newText,
edited:true
});
}
};

document.getElementById("messageInput").addEventListener("input", async ()=>{
document.getElementById("typing").innerText=username+" typing...";
setTimeout(()=>{
document.getElementById("typing").innerText="";
},1000);
});

async function addStatus(text){
await addDoc(statusRef,{
username,
text,
time:serverTimestamp()
});
}

async function addCall(type){
await addDoc(callsRef,{
username,
type,
time:serverTimestamp()
});
}

window.addStatus = addStatus;
window.addCall = addCall;

</script>

</body>
</html>
