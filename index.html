<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KhamChat</title>
<style>
/* ====== DESIGN MAI KYAU KAMAR HOTONKA ====== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
:root{
--bg1:#0a0a1f;--bg2:#1a0f2e;--bg3:#2d1b4e;
--panel:rgba(26,15,46,0.7);--panel2:rgba(45,27,78,0.5);
--accent:#8b5cf6;--accent2:#a855f7;--green:#10b981;
--text:#f3f4f6;--text2:#a1a1aa;--border:rgba(139,92,246,0.2);
}
body.light{
--bg1:#f5f3ff;--bg2:#ede9fe;--bg3:#ddd6fe;
--panel:rgba(255,255,255,0.9);--panel2:rgba(255,255,255,0.7);
--text:#1f2937;--text2:#6b7280;--border:rgba(139,92,246,0.3);
}
html,body{height:100dvh;width:100vw;overflow:hidden;background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));color:var(--text)}
#app{height:100dvh;width:100vw;display:flex;flex-direction:column}
.glass{background:var(--panel);backdrop-filter:blur(20px);border:1px solid var(--border)}

.header{
background:var(--panel);padding:16px 20px;display:flex;
justify-content:space-between;align-items:center;
border-bottom:1px solid var(--border);
}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.headerIcons{display:flex;gap:20px;font-size:20px;cursor:pointer}

.tabs{display:flex;justify-content:space-around;background:var(--panel2);padding:12px;border-bottom:1px solid var(--border)}
.tab{cursor:pointer;padding:8px 16px;border-radius:12px;font-weight:600;color:var(--text2)}
.tab.active{background:var(--accent);color:#fff}

#chatArea{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.message{
background:var(--panel2);padding:10px 14px;
border-radius:18px;max-width:75%;font-size:15px;
border-bottom-left-radius:6px;align-self:flex-start;
}
.message.me{
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:#fff;border-bottom-left-radius:18px;border-bottom-right-radius:6px;
align-self:flex-end;
}
.message b{display:block;font-size:13px;margin-bottom:4px;opacity:0.8}
.message img{max-width:200px;border-radius:12px;margin-top:8px;display:block}
.small{font-size:11px;opacity:0.7;margin-top:4px;display:flex;gap:6px}
.msgBtn{background:transparent;border:none;color:var(--text2);font-size:11px;cursor:pointer;padding:2px 4px}

.bottom{
display:flex;gap:10px;padding:12px 16px;
background:var(--panel);border-top:1px solid var(--border);
}
.bottom input{flex:1;padding:14px 18px;background:var(--panel2);border:none;border-radius:24px;color:var(--text);outline:none;font-size:15px}
.bottom button{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:20px;cursor:pointer}
.iconBtn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text2);cursor:pointer}

#setup,#settingsModal{
position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);
display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:2000;
}
.modalBox{background:var(--panel);width:90%;max-width:360px;border-radius:20px;padding:24px;border:1px solid var(--border);text-align:center}
.modalBox input{width:100%;padding:14px;margin-top:12px;background:var(--panel2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:16px}
.btn{width:100%;padding:14px;margin-top:12px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
.setItem{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.setItem select{background:var(--panel2);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:8px}
#typing{padding:0 16px;font-size:12px;color:var(--text2);height:20px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:12px 20px;border-radius:24px;z-index:3000;display:none}
</style>
</head>
<body>

<div id="app">
<div class="header glass">
<h1>KhamChat</h1>
<div class="headerIcons">
<span id="setBtn">⚙️</span>
</div>
</div>

<div class="tabs glass">
<div class="tab active" id="tabChats">Chats</div>
<div class="tab" id="tabUsers">Users</div>
</div>

<div id="typing"></div>
<div id="chatArea"></div>

<div class="bottom glass">
<span class="iconBtn" id="imgBtn">📎</span>
<input type="file" id="imageInput" accept="image/*" style="display:none">
<input id="messageInput" placeholder="Type message...">
<button id="sendBtn">➤</button>
</div>
</div>

<!-- SETUP SUNA -->
<div id="setup">
<div class="modalBox">
<h2>Setup Profile</h2>
<p style="color:var(--text2);font-size:13px;margin:8px 0">Choose a username to start</p>
<input id="username" placeholder="Musa_Kano" maxlength="15">
<button class="btn" id="startBtn">Start</button>
</div>
</div>

<!-- SETTINGS -->
<div id="settingsModal" style="display:none">
<div class="modalBox">
<h3 style="margin-bottom:16px">Settings / Saituna</h3>
<div class="setItem">
<span>Language / Harshe</span>
<select id="lang">
<option value="en">English</option>
<option value="ha">Hausa</option>
</select>
</div>
<div class="setItem">
<span>Mode / Yanayi</span>
<select id="theme">
<option value="dark">Dark</option>
<option value="light">Light</option>
<option value="auto">System / Na Asali</option>
</select>
</div>
<button class="btn" id="closeSetBtn">Close / Rufe</button>
</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy, updateDoc, deleteDoc, doc, setDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyAsFeKfeYTIGzP221hwPlFBHPiYyy-TLqE",
authDomain: "khamchat-1d5a4.firebaseapp.com",
projectId: "khamchat-1d5a4",
storageBucket: "khamchat-1d5a4.firebasestorage.app",
messagingSenderId: "515176934851",
appId: "1:515176934851:web:4ec261196d1ff497666176"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let me = null, username = '', currentChatId = null, lang = 'en', isSetup = false;

// ====== 1. SHIGA BOYE NAN TAKE ======
signInAnonymously(auth);
onAuthStateChanged(auth, async (user) => {
if(user){
me = user;
const q = query(collection(db,'users'), where('uid','==',user.uid));
const snap = await getDocs(q);
if(!snap.empty){
username = snap.docs[0].data().displayName;
isSetup = true;
document.getElementById("setup").style.display="none";
loadUsers();
}
});

// ====== 2. SAKA SUNA ======
document.getElementById("startBtn").onclick = async () => {
username = document.getElementById("username").value.trim();
if(username.length < 3) return toast(lang==='ha'?'Suna 3+ harafi':'Username 3+ letters');
const check = await getDocs(query(collection(db,'users'), where('username','==',username.toLowerCase())));
if(!check.empty) return toast(lang==='ha'?'Suna ya cika':'Username taken');
await setDoc(doc(db,'users',me.uid), {uid:me.uid, username: username.toLowerCase(), displayName: username, online:true});
isSetup = true;
document.getElementById("setup").style.display="none";
loadUsers();
};

// ====== 3. LOAD USERS NA GASKIYA ======
async function loadUsers(){
const snap = await getDocs(collection(db,'users'));
let html = '';
snap.forEach(d=>{
if(d.id === me.uid) return;
const u = d.data();
html += `<div class="message" style="align-self:stretch;cursor:pointer" onclick="openChat('${d.id}','${u.displayName}')">👤 ${u.displayName}</div>`;
});
document.getElementById("chatArea").innerHTML = html || '<div style="text-align:center;color:var(--text2)">No users</div>';
}

// ====== 4. BUDA CHAT NA SIRRI ======
window.openChat = (uid, name) => {
currentChatId = [me.uid, uid].sort().join('_');
document.getElementById("chatArea").innerHTML = '';
document.getElementById("tabChats").classList.add('active');
document.getElementById("tabUsers").classList.remove('active');
const q = query(collection(db,'chats',currentChatId,'messages'), orderBy("time","asc"));
onSnapshot(q,(snapshot)=>{
let area = document.getElementById("chatArea");
area.innerHTML="";
snapshot.forEach((docSnap)=>{
let data = docSnap.data();
let div = document.createElement("div");
div.className="message";
if(data.sender===me.uid){div.classList.add("me");}
div.innerHTML=`<b>${data.username}</b><br>${data.text || ""}${data.image? `<img src="${data.image}">` : ""}
<div class="small">${data.seen? "✓ Seen" : "✓ Sent"} ${data.edited? "(edited)" : ""}
${data.sender===me.uid?`<button class="msgBtn" onclick="editMessage('${docSnap.id}')">Edit</button><button class="msgBtn" onclick="deleteMessage('${docSnap.id}')">Del</button>`:''}
</div>`;
area.appendChild(div);
if(data.sender!==me.uid &&!data.seen){updateDoc(doc(db,"chats",currentChatId,"messages",docSnap.id),{seen:true});}
});
area.scrollTop=area.scrollHeight;
});
}

// ====== 5. AIKO MESSAGE + PHOTO ======
document.getElementById("sendBtn").onclick = async () => {
if(!isSetup) return document.getElementById("setup").style.display="flex";
if(!currentChatId) return toast(lang==='ha'?'Danna user da farko':'Tap a user first');
let text = document.getElementById("messageInput").value.trim();
let file = document.getElementById("imageInput").files[0];
let imageUrl = "";
if(file){
const storageRef = ref(storage,"images/"+Date.now());
await uploadBytes(storageRef,file);
imageUrl = await getDownloadURL(storageRef);
}
if(!text &&!imageUrl) return;
await addDoc(collection(db,"chats",currentChatId,"messages"),{
sender:me.uid, username:username, text:text, image:imageUrl,
time:serverTimestamp(), seen:false, edited:false
});
document.getElementById("messageInput").value="";
document.getElementById("imageInput").value="";
}
document.getElementById("imgBtn").onclick = () => document.getElementById("imageInput").click();
document.getElementById("messageInput").onkeyup = e => {if(e.key==='Enter') document.getElementById("sendBtn").click();}

// ====== 6. EDIT / DELETE ======
window.deleteMessage = async (id) => {await deleteDoc(doc(db,"chats",currentChatId,"messages",id));};
window.editMessage = async (id) => {
let newText = prompt(lang==='ha'?'Gyara sako:':'Edit message:');
if(newText){await updateDoc(doc(db,"chats",currentChatId,"messages",id),{text:newText,edited:true});}
};

// ====== 7. TYPING ======
document.getElementById("messageInput").addEventListener("input", () => {
document.getElementById("typing").innerText = username+" "+(lang==='ha'?'yana rubutu...':'is typing...');
setTimeout(()=>{document.getElementById("typing").innerText="";},1500);
});

// ====== 8. SETTINGS ENGLISH/HAUSA + DARK/LIGHT/AUTO ======
document.getElementById("setBtn").onclick = () => document.getElementById("settingsModal").style.display="flex";
document.getElementById("closeSetBtn").onclick = () => document.getElementById("settingsModal").style.display="none";
document.getElementById("lang").onchange = e => {
lang = e.target.value;
document.getElementById("messageInput").placeholder = lang==='ha'?'Rubuta sako...':'Type message...';
document.getElementById("tabChats").innerText = lang==='ha'?'Chat':'Chats';
document.getElementById("tabUsers").innerText = lang==='ha'?'Mutane':'Users';
}
document.getElementById("theme").onchange = e => {
const m = e.target.value;
if(m==='light') document.body.classList.add('light');
else if(m==='dark') document.body.classList.remove('light');
else document.body.classList.toggle('light', window.matchMedia('(prefers-color-scheme: light)').matches);
}
document.getElementById("tabUsers").onclick = () => {
document.getElementById("tabUsers").classList.add('active');
document.getElementById("tabChats").classList.remove('active');
currentChatId = null;
loadUsers();
}
function toast(msg){const t=document.getElementById('toast');t.innerText=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}
});
</script>
</body>
</html>
