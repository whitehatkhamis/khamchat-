<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aboki AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a24;--hover:#1f1f2b;--border:#22222e;
--accent:#7c3aed;--gradient:linear-gradient(135deg,#7c3aed 0%,#a855f7 50%,#ec4899 100%);
--text:#f4f4f5;--text2:#a1a1aa;--green:#22c55e;--blue:#3b82f6;
--me:linear-gradient(135deg,#7c3aed,#a855f7);--other:#1e1e2a;
}
body.light{--bg:#ffffff;--bg2:#f8fafc;--bg3:#f1f5f9;--hover:#e2e8f0;--border:#e2e8f0;--text:#0f172a;--text2:#64748b;--other:#f1f5f9}
html,body{background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;display:flex;width:100%}

#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
#loginBox{background:var(--bg2);padding:40px;border-radius:20px;border:1px solid var(--border);width:90%;max-width:380px;text-align:center}
#loginBox h1{font-size:36px;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
#loginBox p{color:var(--text2);margin-bottom:20px;font-size:14px}
#loginBox input{width:100%;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;margin-bottom:12px}
#loginBox button{width:100%;padding:14px;background:var(--gradient);border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer;font-size:16px;margin-bottom:8px}

#app{display:none;width:100%;height:100vh;height:100dvh}
#side{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px}
.profile{display:flex;align-items:center;gap:12px;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:20px}
.profile img{width:50px;height:50px;border-radius:50%;background:var(--gradient)}
.profile div h3{font-size:16px;margin-bottom:3px}
.profile div p{font-size:12px;color:var(--text2)}

.menu{display:flex;flex-direction:column;gap:4px}
.item{padding:12px;display:flex;align-items:center;gap:12px;border-radius:10px;cursor:pointer;color:var(--text2);font-size:15px}
.item:hover,.item.active{background:var(--hover);color:var(--text)}

#contacts{width:360px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column}
.head{padding:24px;background:var(--bg2);border-bottom:1px solid var(--border)}
.head h2{font-size:24px;font-weight:700;margin-bottom:16px}
.list{flex:1;overflow-y:auto;padding:8px}
.person{padding:12px;display:flex;gap:12px;border-radius:12px;cursor:pointer}
.person:hover{background:var(--hover)}
.avatar{width:48px;height:48px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:700;position:relative;font-size:18px}
.avatar.on::after{content:'';position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:var(--green);border:2px solid var(--bg);border-radius:50%}
.info{flex:1;overflow:hidden}
.name{font-size:15px;font-weight:600;margin-bottom:4px}
.status-text{font-size:12px;color:var(--text2)}

#chat{flex:1;display:none;flex-direction:column;background:var(--bg);width:100%}
.chatHead{padding:16px 24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.backBtn{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px}
.chatInfo{flex:1}
.chatName{font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px}
.status{font-size:12px;color:var(--green);display:flex;align-items:center;gap:4px}
.status::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%}
.status.offline{color:var(--text2)}
.status.offline::before{background:var(--text2)}

.msgs{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
.date{text-align:center;color:var(--text2);font-size:13px;margin:20px 0}
.row{display:flex;gap:10px;margin:12px 0}
.row.me{justify-content:flex-end}
.bubble{max-width:65%;padding:12px 16px;border-radius:18px}
.row.other.bubble{background:var(--other);border-bottom-left-radius:4px}
.row.me.bubble{background:var(--me);color:#fff;border-bottom-right-radius:4px}
.btext{font-size:15px;line-height:22px;word-wrap:break-word}
.btime{font-size:11px;color:var(--text2);margin-top:4px;display:flex;gap:4px;align-items:center}
.row.me.btime{justify-content:flex-end}
.audio-player{width:200px;height:40px}

.input{padding:16px 24px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
.attach{display:flex;gap:8px}
.attach button{width:40px;height:40px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.input input{flex:1;padding:14px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:24px;color:var(--text);font-size:16px;outline:none}
.send{width:48px;height:48px;border-radius:50%;background:var(--gradient);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send.recording{background:red}

#ai{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:200}
.aiHead{padding:20px 24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.aiHead h3{flex:1;text-align:center;font-size:18px;font-weight:700}
.aiHead button{background:none;border:none;color:var(--text2);font-size:28px;cursor:pointer}
.aiMsgs{flex:1;overflow-y:auto;padding:24px}
.aiInput{padding:16px 24px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:10px}

#fileInput{display:none}
#cameraInput{display:none}

@media(max-width:768px){
#side{position:fixed;bottom:0;left:0;width:100%;height:70px;flex-direction:row;padding:8px 0;border-top:1px solid var(--border);z-index:100}
.profile{display:none}
.menu{flex-direction:row;width:100%;justify-content:space-around}
.item{flex-direction:column;font-size:10px;gap:4px;padding:6px 4px}
#contacts{width:100%;height:calc(100vh - 70px);height:calc(100dvh - 70px);border-right:none}
#chat{width:100%;height:calc(100vh - 70px);height:calc(100dvh - 70px)}
#chat.fullscreen{position:fixed;top:0;left:0;width:100%;height:100vh;height:100dvh;z-index:150}
.backBtn{display:block!important}
.bubble{max-width:78%}
.input{padding:10px 12px;gap:8px}
.attach button{width:38px;height:38px}
.input input{padding:12px 16px;font-size:16px}
.send{width:44px;height:44px}
.audio-player{width:150px}
</style>
</head>
<body>

<div id="login">
<div id="loginBox">
<h1>Aboki AI</h1>
<p>Sign in or create account</p>
<input type="email" id="email" placeholder="Email address">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()" style="background:#444">Create Account</button>
</div>
</div>

<div id="app">
<div id="side">
<div class="profile">
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g'%3E%3Cstop offset='0' stop-color='%237c3aed'/%3E%3Cstop offset='1' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='50' y='60' font-size='40' text-anchor='middle' fill='white'%3EAI%3C/text%3E%3C/svg%3E">
<div>
<h3 id="sname">User</h3>
<p id="myStatus">Online</p>
</div>
</div>
<div class="menu">
<div class="item active" onclick="showChat()">Chats</div>
<div class="item" onclick="showContacts()">Contacts</div>
<div class="item" onclick="openAI()">Khamis AI</div>
<div class="item" onclick="logout()">Logout</div>
</div>
</div>

<div id="contacts">
<div class="head">
<h2>Contacts</h2>
</div>
<div class="list" id="list">Loading contacts...</div>
</div>

<div id="chat">
<div class="chatHead">
<button class="backBtn" onclick="back()">←</button>
<div class="avatar on" id="cavatar">AI</div>
<div class="chatInfo">
<div class="chatName" id="cname">Khamis AI</div>
<div class="status" id="cstatus">Online</div>
</div>
</div>
<div class="msgs" id="msgs"><div class="date">Today</div></div>
<div class="input">
<div class="attach">
<button onclick="document.getElementById('fileInput').click()">📎</button>
<button onclick="toggleRecording()" id="recBtn">🎤</button>
<button onclick="document.getElementById('cameraInput').click()">📷</button>
</div>
<input type="text" id="inp" placeholder="Type your message..." onkeyup="if(event.key==='Enter') sendMessage()">
<button class="send" onclick="sendMessage()">➤</button>
</div>
</div>
</div>

<div id="ai">
<div class="aiHead">
<button onclick="closeAI()">←</button>
<h3>Khamis AI</h3>
<button onclick="clearAI()">🗑️</button>
</div>
<div class="aiMsgs" id="aiMsgs"><div style="text-align:center;color:var(--text2);margin-top:100px">Ask Khamis AI anything...</div></div>
<div class="aiInput">
<input type="text" id="aiInp" placeholder="Ask Khamis AI..." onkeyup="if(event.key==='Enter') sendAI()">
<button class="send" onclick="sendAI()">➤</button>
</div>
</div>

<input type="file" id="fileInput" accept="image/*,video/*,.pdf,.doc,.docx">
<input type="file" id="cameraInput" accept="image/*" capture="environment">

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

// YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAsFeKfeYTIGzP221hwPlFBHPiYyy-TLqE",
  authDomain: "khamchat-1d5a4.firebaseapp.com",
  projectId: "khamchat-1d5a4",
  storageBucket: "khamchat-1d5a4.firebasestorage.app",
  messagingSenderId: "515176934851",
  appId: "1:515176934851:web:4ec261196d1ff497666176",
  measurementId: "G-P7JRRZ3M2M"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;
let currentChatId = null;
let currentChatUser = null;
let unsubscribeMessages = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

// AUTH FUNCTIONS
window.login = async function(){
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;
try{
await signInWithEmailAndPassword(auth, email, password);
}catch(e){alert(e.message)}
}

window.register = async function(){
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;
const name = email.split('@')[0];
try{
const userCred = await createUserWithEmailAndPassword(auth, email, password);
await setDoc(doc(db, 'users', userCred.user.uid), {
name: name,
email: email,
online: true,
lastSeen: serverTimestamp(),
createdAt: serverTimestamp()
});
}catch(e){alert(e.message)}
}

window.logout = async () => {
await updateDoc(doc(db, 'users', currentUser.uid), {online: false, lastSeen: serverTimestamp()});
signOut(auth);
}

// AUTH STATE CHECKER
onAuthStateChanged(auth, async (user) => {
if(user){
currentUser = user;
document.getElementById('sname').innerText = user.email.split('@')[0];
document.getElementById('login').style.display = 'none';
document.getElementById('app').style.display = 'flex';
await updateDoc(doc(db, 'users', user.uid), {online: true});
loadContacts();
openChat('Khamis AI', 'bot');
window.addEventListener('beforeunload', () => updateDoc(doc(db, 'users', user.uid), {online: false, lastSeen: serverTimestamp()}));
}else{
document.getElementById('login').style.display = 'flex';
document.getElementById('app').style.display = 'none';
}
});

// LOAD CONTACTS WITH ONLINE STATUS
async function loadContacts(){
const q = query(collection(db, 'users'), where('__name__', '!=', currentUser.uid));
onSnapshot(q, (snapshot) => {
let html = '';
snapshot.forEach(docSnap => {
const u = docSnap.data();
const statusClass = u.online? 'on' : '';
const statusText = u.online? 'Online' : 'Offline';
html += `<div class="person" onclick="openChat('${u.name}', '${docSnap.id}')"><div class="avatar ${statusClass}">${u.name.charAt(0).toUpperCase()}</div><div class="info"><div class="name">${u.name}</div><div class="status-text">${statusText}</div></div></div>`;
});
html += `<div class="person" onclick="openChat('Khamis AI', 'bot')"><div class="avatar">AI</div><div class="info"><div class="name">Khamis AI</div><div class="status-text">Online</div></div></div>`;
document.getElementById('list').innerHTML = html;
});
}

// OPEN CHAT
window.openChat = function(name, uid){
currentChatUser = uid;
currentChatId = uid === 'bot'? 'bot' : [currentUser.uid, uid].sort().join('_');
document.getElementById('cname').innerText = name;
document.getElementById('cavatar').innerText = name.charAt(0);
document.getElementById('contacts').style.display = 'none';
document.getElementById('chat').style.display = 'flex';
document.getElementById('chat').classList.add('fullscreen');

if(unsubscribeMessages) unsubscribeMessages();

if(uid === 'bot'){
document.getElementById('msgs').innerHTML = `<div class="date">Today</div><div class="row other"><div class="avatar">AI</div><div class="bubble"><div class="btext">Hello! I am Khamis AI. How can I help you today?</div></div></div>`;
return;
}

// WATCH USER STATUS
onSnapshot(doc(db, 'users', uid), (snap) => {
const u = snap.data();
document.getElementById('cstatus').innerText = u.online? 'Online' : 'Last seen recently';
document.getElementById('cstatus').className = u.online? 'status' : 'status offline';
});

// WATCH MESSAGES
const q = query(collection(db, 'chats', currentChatId, 'messages'), orderBy('timestamp'));
unsubscribeMessages = onSnapshot(q, (snapshot) => {
let html = '<div class="date">Today</div>';
snapshot.forEach(docSnap => {
const m = docSnap.data();
const isMe = m.sender === currentUser.uid;
let content = '';
if(m.type === 'text') content = `<div class="btext">${m.text}</div>`;
else if(m.type === 'audio') content = `<audio controls class="audio-player" src="${m.url}"></audio>`;
else if(m.type === 'image') content = `<img src="${m.url}" style="max-width:250px;border-radius:12px">`;
else if(m.type === 'file') content = `<a href="${m.url}" target="_blank" style="color:inherit">📎 ${m.fileName}</a>`;

html += `<div class="row ${isMe?'me':''}"><div class="bubble">${content}<div class="btime">${m.timestamp? new Date(m.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</div></div></div>`;
});
document.getElementById('msgs').innerHTML = html;
document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
});
}

// SEND TEXT MESSAGE
window.sendMessage = async function(){
const inp = document.getElementById('inp');
const text = inp.value.trim();
if(!text || currentChatId === 'bot') return;
await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
text: text,
type: 'text',
sender: currentUser.uid,
timestamp: serverTimestamp()
});
inp.value = '';
}

// VOICE RECORDING
window.toggleRecording = async function(){
const btn = document.getElementById('recBtn');
if(!isRecording){
const stream = await navigator.mediaDevices.getUserMedia({audio: true});
mediaRecorder = new MediaRecorder(stream);
audioChunks = [];
mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
mediaRecorder.onstop = async () => {
const audioBlob = new Blob(audioChunks, {type: 'audio/webm'});
const storageRef = ref(storage, `audio/${currentChatId}/${Date.now()}.webm`);
await uploadBytes(storageRef, audioBlob);
const url = await getDownloadURL(storageRef);
await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
type: 'audio',
url: url,
sender: currentUser.uid,
timestamp: serverTimestamp()
});
}
mediaRecorder.start();
isRecording = true;
btn.classList.add('recording');
btn.innerText = '⏹️';
}else{
mediaRecorder.stop();
isRecording = false;
btn.classList.remove('recording');
btn.innerText = '🎤';
}
}

// UPLOAD FILE
document.getElementById('fileInput').onchange = async (e) => {
const file = e.target.files[0];
if(!file) return;
const storageRef = ref(storage, `files/${currentChatId}/${Date.now()}_${file.name}`);
await uploadBytes(storageRef, file);
const url = await getDownloadURL(storageRef);
await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
type: 'file',
url: url,
fileName: file.name,
sender: currentUser.uid,
timestamp: serverTimestamp()
});
}

// CAMERA PHOTO
document.getElementById('cameraInput').onchange = async (e) => {
const file = e.target.files[0];
if(!file) return;
const storageRef = ref(storage, `images/${currentChatId}/${Date.now()}.jpg`);
await uploadBytes(storageRef, file);
const url = await getDownloadURL(storageRef);
await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
type: 'image',
url: url,
sender: currentUser.uid,
timestamp: serverTimestamp()
});
}

// NAVIGATION
window.back = function(){
document.getElementById('chat').classList.remove('fullscreen');
document.getElementById('chat').style.display='none';
document.getElementById('contacts').style.display='flex';
if(unsubscribeMessages) unsubscribeMessages();
}
window.showChat = function(){document.getElementById('chat').style.display='none';document.getElementById('contacts').style.display='flex';document.getElementById('chat').classList.remove('fullscreen')}
window.showContacts = function(){}
window.openAI = function(){document.getElementById('ai').style.display='flex'}
window.closeAI = function(){document.getElementById('ai').style.display='none'}
window.sendAI = function(){
const inp = document.getElementById('aiInp');
const text = inp.value.trim();
if(!text) return;
document.getElementById('aiMsgs').innerHTML += `<div class="row me"><div class="bubble"><div class="btext">${text}</div></div></div>`;
inp.value = '';
setTimeout(()=>{document.getElementById('aiMsgs').innerHTML += `<div class="row other"><div class="avatar">AI</div><div class="bubble"><div class="btext">I understand. How can I help you further?</div></div></div>`},800);
}
window.clearAI = function(){document.getElementById('aiMsgs').innerHTML = '<div style="text-align:center;color:var(--text2);margin-top:100px">Ask Khamis AI anything...</div>'}
</script>
</body>
</html>
