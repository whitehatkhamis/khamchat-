<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KhamChat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
:root{
--bg1:#f5f3ff;--bg2:#ede9fe;--accent:#8b5cf6;--accent2:#a855f7;--gold:#fbbf24;
--text:#1f2937;--text2:#6b7280;--card:#fff;--border:rgba(139,92,246,0.2);
}
body.dark{
--bg1:#0a0a1f;--bg2:#1a0f2e;--text:#f3f4f6;--text2:#a1a1aa;--card:rgba(26,15,46,0.7);
}
html,body{height:100dvh;width:100vw;overflow:hidden;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--text)}
#app{height:100dvh;width:100vw;display:flex;flex-direction:column}
.glass{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border)}
.header{background:var(--card);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header h1{font-size:24px;font-weight:700;color:var(--accent)}
.tabs{display:flex;justify-content:space-around;background:var(--card);padding:8px;margin:12px;border-radius:16px;position:sticky;top:68px;z-index:9}
.tab{cursor:pointer;padding:10px 28px;border-radius:12px;font-weight:600;color:var(--text2);transition:0.3s}
.tab.active{background:var(--accent);color:#fff}
#chatArea{flex:1;overflow-y:auto;padding:16px 16px 90px 16px;display:flex;flex-direction:column;gap:12px} /* 90px for bottom bar */
.userItem{background:var(--card);padding:16px;border-radius:16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.userItem b{font-size:16px}
.userItem span{font-size:13px;color:var(--text2)}
.userItem.gold{color:var(--gold)}
.message{background:var(--card);padding:12px 16px;border-radius:18px;max-width:75%;font-size:15px;border-bottom-left-radius:6px;align-self:flex-start;word-break:break-word}
.message.me{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-left-radius:18px;border-bottom-right-radius:6px;align-self:flex-end}
.message.bot{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}
.message b{display:block;font-size:13px;margin-bottom:4px;opacity:0.8}
.small{font-size:11px;opacity:0.7;margin-top:4px}
.bottom{position:fixed;bottom:0;left:0;right:0;display:none;gap:8px;padding:12px 16px;background:var(--card);border-top:1px solid var(--border);z-index:999} /* FIXED BOTTOM */
.bottom.show{display:flex}
.bottom input{flex:1;min-width:0;padding:14px 18px;background:var(--bg2);border:none;border-radius:24px;color:var(--text);outline:none;font-size:15px} /* min-width:0 = no overflow */
.bottom button{width:46px;height:46px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0} /* NO SHRINK */
.iconBtn{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text2);cursor:pointer;background:var(--bg2);flex-shrink:0}
.iconBtn.recording{background:red;color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:2000}
.modal.show{display:flex}
.modalBox{background:var(--card);width:90%;max-width:360px;border-radius:20px;padding:24px;border:1px solid var(--border);text-align:center}
.modalBox input{width:100%;padding:14px;margin-top:12px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:16px}
.btn{width:100%;padding:14px;margin-top:12px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
#typing{padding:0 16px;font-size:12px;color:var(--text2);height:20px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:12px 20px;border-radius:24px;z-index:3000;display:none}
.chatHeader{background:var(--card);padding:12px 16px;border-bottom:1px solid var(--border);display:none;gap:12px;align-items:center;position:sticky;top:0;z-index:10}
.chatHeader.show{display:flex}
.backBtn{font-size:22px;cursor:pointer}

/* BOT BUTTON */
#botBtn{
position:fixed;bottom:80px;right:20px;z-index:1001; /* Above bottom bar */
width:60px;height:60px;border-radius:50%;
background:linear-gradient(135deg,#4285F4,#34A853,#FBBC04,#EA4335);
display:flex;align-items:center;justify-content:center;
font-size:32px;box-shadow:0 4px 20px rgba(66,133,244,0.4);
cursor:pointer;border:none;color:#fff;
}
#botBtn.hide{display:none} /* Hide in chat */
#botBtn:active{transform:scale(0.9)}
</style>
</head>
<body>

<div id="app">
<div class="header glass">
<h1>KhamChat</h1>
<div style="display:flex;gap:16px;align-items:center">
<span style="font-size:28px;cursor:pointer" id="moneyBtn">💰</span>
<span style="font-size:24px;cursor:pointer" id="setBtn">⚙️</span>
</div>
</div>

<div class="tabs glass">
<div class="tab" id="tabChats">Chats</div>
<div class="tab active" id="tabUsers">Users</div>
</div>

<div class="chatHeader glass" id="chatHeader">
<span class="backBtn" id="backBtn">←</span>
<h3 id="chatWithName">Chat</h3>
</div>

<div id="typing"></div>
<div id="chatArea"></div>

<div class="bottom glass" id="bottomBar">
<span class="iconBtn" id="imgBtn">📎</span>
<span class="iconBtn" id="micBtn">🎤</span>
<input type="file" id="imageInput" accept="image/*" style="display:none">
<input id="messageInput" placeholder="Type message...">
<button id="sendBtn">➤</button>
</div>
</div>

<button id="botBtn">✨</button>

<div class="modal" id="setup">
<div class="modalBox">
<h2>Setup Profile</h2>
<p style="color:var(--text2);font-size:13px;margin:8px 0">Choose a username to start</p>
<input id="username" placeholder="Musa_Kano" maxlength="15">
<button class="btn" id="startBtn">Start</button>
</div>
</div>

<div class="modal" id="settingsModal" style="display:none">
<div class="modalBox">
<h3 style="margin-bottom:16px">Settings / Saituna</h3>
<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)">
<span>Language / Harshe</span>
<select id="lang" style="background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:8px">
<option value="en">English</option>
<option value="ha">Hausa</option>
</select>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0">
<span>Mode / Yanayi</span>
<select id="theme" style="background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:8px">
<option value="light">Light</option>
<option value="dark">Dark</option>
</select>
</div>
<button class="btn" id="closeSetBtn">Close / Rufe</button>
</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy, updateDoc, deleteDoc, doc, setDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyAsFeKfeYTIGzP221hwPlFBHPiYyy-TLqE",
authDomain: "khamchat-1d5a4.firebaseapp.com",
projectId: "khamchat-1d5a4",
storageBucket: "khamchat-1d5a4.firebasestorage.app",
messagingSenderId: "515176934851",
appId: "1:515176934851:web:4ec261196d1ff497666176"
};

const GEMINI_API_KEY = "SAKA_GEMINI_API_KEY_NAKA_ANAN";
const MONETAG_KEY = "SAKA_MONETAG_KEY_NAKA_ANAN";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let me = null, username = '', currentChatId = null, lang = 'en', isSetup = false;
let mediaRecorder, audioChunks = [];

function showMonetagAd(){
if(MONETAG_KEY === "SAKA_MONETAG_KEY_NAKA_ANAN"){toast("Saka Monetag Key da farko");return;}
const script = document.createElement('script');
script.src = `https://www.monetag.com/script.js?key=${MONETAG_KEY}`;
document.body.appendChild(script);
toast(lang==='ha'?'Ad ya buɗe +$0.001':'Ad opened +$0.001');
}

signInAnonymously(auth).catch(e=>toast('Auth Error'));

onAuthStateChanged(auth, async (user) => {
if(!user) return;
me = user;
const snap = await getDocs(query(collection(db,'users'), where('uid','==',user.uid)));
if(!snap.empty){
username = snap.docs[0].data().displayName;
isSetup = true;
document.getElementById("setup").classList.remove('show');
loadUsers();
}else{
document.getElementById("setup").classList.add('show');
}
});

document.getElementById("startBtn").onclick = async () => {
username = document.getElementById("username").value.trim();
if(username.length < 3) return toast(lang==='ha'?'Suna 3+ harafi':'Username 3+ letters');
const check = await getDocs(query(collection(db,'users'), where('username','==',username.toLowerCase())));
if(!check.empty) return toast(lang==='ha'?'Suna ya cika':'Username taken');
await setDoc(doc(db,'users',me.uid), {uid:me.uid, username: username.toLowerCase(), displayName: username});
isSetup = true;
document.getElementById("setup").classList.remove('show');
loadUsers();
};

async function loadUsers(){
document.getElementById("chatArea").innerHTML = '<div style="text-align:center;color:var(--text2)">Loading...</div>';
const snap = await getDocs(collection(db,'users'));
let html = '';
snap.forEach(d=>{
if(d.id === me.uid) return;
const u = d.data();
html += `<div class="userItem" onclick="openChat('${d.id}','${u.displayName}')">👤 <div><b>${u.displayName}</b><br><span>Tap to chat</span></div></div>`;
});
html += `<div class="userItem" onclick="openBotChat()">✨ <div><b>Khamis AI</b><br><span class="gold">Ask me anything</span></div></div>`;
document.getElementById("chatArea").innerHTML = html;
}

window.openChat = (uid, name) => {
currentChatId = [me.uid, uid].sort().join('_');
document.getElementById("chatWithName").innerText = name;
document.getElementById("chatArea").innerHTML = '';
document.getElementById("chatHeader").classList.add('show');
document.getElementById("bottomBar").classList.add('show');
document.getElementById("botBtn").classList.add('hide'); // HIDE BOT
document.getElementById("tabChats").classList.add('active');
document.getElementById("tabUsers").classList.remove('active');
const q = query(collection(db,'chats',currentChatId,'messages'), orderBy("time","asc"));
onSnapshot(q,(snapshot)=>{
let area = document.getElementById("chatArea"); area.innerHTML="";
snapshot.forEach((docSnap)=>{
let data = docSnap.data();
let div = document.createElement("div");
div.className="message "+(data.sender===me.uid?"me":data.sender==='bot'?"bot":"");
div.innerHTML=`<b>${data.username}</b><br>${data.text}${data.audio?`<br><audio controls src="${data.audio}"></audio>`:""}
<div class="small">${data.seen? "✓ Seen" : "✓ Sent"} ${data.edited? "(edited)" : ""}</div>`;
area.appendChild(div);
if(data.sender!==me.uid &&!data.seen){updateDoc(doc(db,"chats",currentChatId,"messages",docSnap.id),{seen:true});}
});
area.scrollTop=area.scrollHeight;
});
}

window.openBotChat = () => {
currentChatId = "bot_chat_"+me.uid;
document.getElementById("chatWithName").innerText = "Khamis AI ✨";
document.getElementById("chatArea").innerHTML = '';
document.getElementById("chatHeader").classList.add('show');
document.getElementById("bottomBar").classList.add('show');
document.getElementById("botBtn").classList.add('hide'); // HIDE BOT
const q = query(collection(db,'chats',currentChatId,'messages'), orderBy("time","asc"));
onSnapshot(q,(snapshot)=>{
let area = document.getElementById("chatArea"); area.innerHTML="";
snapshot.forEach((docSnap)=>{
let data = docSnap.data();
let div = document.createElement("div");
div.className="message "+(data.sender===me.uid?"me":"bot");
div.innerHTML=`<b>${data.username}</b><br>${data.text}${data.audio?`<br><audio controls src="${data.audio}"></audio>`:""}`;
area.appendChild(div);
});
area.scrollTop=area.scrollHeight;
});
}

document.getElementById("botBtn").onclick = () => openBotChat();
document.getElementById("backBtn").onclick = () => {
currentChatId = null;
document.getElementById("chatHeader").classList.remove('show');
document.getElementById("bottomBar").classList.remove('show');
document.getElementById("botBtn").classList.remove('hide'); // SHOW BOT
document.getElementById("tabUsers").click();
}

async function callGemini(text){
if(GEMINI_API_KEY === "SAKA_GEMINI_API_KEY_NAKA_ANAN") return "Saka Gemini API Key da farko aboki";
const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,{
method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({contents:[{parts:[{text:text}]}]})
});
const data = await res.json();
return data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't respond";
}

document.getElementById("micBtn").onmousedown = startRecording;
document.getElementById("micBtn").onmouseup = stopRecording;
document.getElementById("micBtn").ontouchstart = startRecording;
document.getElementById("micBtn").ontouchend = stopRecording;

async function startRecording(e){
e.preventDefault();
const stream = await navigator.mediaDevices.getUserMedia({audio:true});
mediaRecorder = new MediaRecorder(stream);
audioChunks = [];
mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
mediaRecorder.onstop = async () => {
const audioBlob = new Blob(audioChunks, {type:'audio/webm'});
const storageRef = ref(storage,"voice/"+Date.now()+".webm");
await uploadBytes(storageRef, audioBlob);
const audioUrl = await getDownloadURL(storageRef);
await sendMessage("", audioUrl);
};
mediaRecorder.start();
document.getElementById("micBtn").classList.add("recording");
}

function stopRecording(){
if(mediaRecorder){mediaRecorder.stop();mediaRecorder.stream.getTracks().forEach(t=>t.stop());}
document.getElementById("micBtn").classList.remove("recording");
}

function speak(text){
const utter = new SpeechSynthesisUtterance(text);
utter.lang = lang==='ha'?'ha-NG':'en-US';
speechSynthesis.speak(utter);
}

document.getElementById("sendBtn").onclick = () => sendMessage();
async function sendMessage(text = null, audioUrl = null){
if(!isSetup) return document.getElementById("setup").classList.add('show');
if(!currentChatId) return toast(lang==='ha'?'Danna user da farko':'Tap a user first');
text = text?? document.getElementById("messageInput").value.trim();
if(!text &&!audioUrl) return;

await addDoc(collection(db,"chats",currentChatId,"messages"),{
sender:me.uid, username:username, text:text, audio:audioUrl, time:serverTimestamp()
});
document.getElementById("messageInput").value="";

if(currentChatId.startsWith("bot_chat_")){
document.getElementById("typing").innerText = "Khamis AI is typing...";
const reply = await callGemini(text);
await addDoc(collection(db,"chats",currentChatId,"messages"),{
sender:'bot', username:'Khamis AI', text:reply, time:serverTimestamp(), seen:true
});
speak(reply);
document.getElementById("typing").innerText = "";
}
}

document.getElementById("imgBtn").onclick = () => document.getElementById("imageInput").click();
document.getElementById("imageInput").onchange = async e => {
const file = e.target.files[0]; if(!file) return;
const storageRef = ref(storage,"images/"+Date.now());
await uploadBytes(storageRef,file);
const imageUrl = await getDownloadURL(storageRef);
await addDoc(collection(db,"chats",currentChatId,"messages"),{
sender:me.uid, username:username, text:"", image:imageUrl, time:serverTimestamp()
});
}
document.getElementById("messageInput").onkeyup = e => {if(e.key==='Enter') document.getElementById("sendBtn").click();}

document.getElementById("setBtn").onclick = () => document.getElementById("settingsModal").classList.add('show');
document.getElementById("closeSetBtn").onclick = () => document.getElementById("settingsModal").classList.remove('show');
document.getElementById("moneyBtn").onclick = () => showMonetagAd();
document.getElementById("lang").onchange = e => {lang = e.target.value;}
document.getElementById("theme").onchange = e => {
e.target.value==='dark'?document.body.classList.add('dark'):document.body.classList.remove('dark');
}
document.getElementById("tabUsers").onclick = () => {
document.getElementById("tabUsers").classList.add('active');
document.getElementById("tabChats").classList.remove('active');
currentChatId = null;
document.getElementById("chatHeader").classList.remove('show');
document.getElementById("bottomBar").classList.remove('show');
document.getElementById("botBtn").classList.remove('hide'); // SHOW BOT
loadUsers();
}
function toast(msg){const t=document.getElementById('toast');t.innerText=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
</script>
</body>
</html>
