<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khamchat</title>
<style>
/* ====== WHATSAPP STYLE ====== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
:root{
--bg:#0b141a;--sidebar:#111b21;--panel:#202c33;--hover:#2a3942;--border:#233138;
--green:#00a884;--text:#e9edef;--text2:#8696a0;
}
body.light{
--bg:#f0f2f5;--sidebar:#ffffff;--panel:#ffffff;--hover:#f5f6f6;--border:#e9edef;
--text:#111b21;--text2:#667781;
}
html,body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

/* ====== LOGIN ====== */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
#loginBox{background:var(--panel);padding:32px;border-radius:12px;width:90%;max-width:340px;text-align:center}
#loginBox h1{font-size:24px;color:var(--green);margin-bottom:16px}
#loginBox input{width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);margin-bottom:12px;outline:none}
#loginBox button{width:100%;padding:12px;background:var(--green);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer}

/* ====== MAIN LAYOUT ====== */
#app{display:none;height:100vh;grid-template-columns:350px 1fr}
@media(max-width:768px){#app{grid-template-columns:1fr}}

/* ====== SIDEBAR CONTACTS ====== */
.sidebar{background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sideHead{padding:10px 16px;background:var(--panel);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.profilePic{width:40px;height:40px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;overflow:hidden}
.profilePic img{width:100%;height:100%;object-fit:cover}
.sideActions{display:flex;gap:20px;color:var(--text2);font-size:20px;cursor:pointer}
.search{padding:8px 12px}
.search input{width:100%;padding:10px 12px;background:var(--bg);border:none;border-radius:8px;color:var(--text);outline:none}
.contactsList{flex:1;overflow-y:auto}
.contact{padding:12px 16px;display:flex;gap:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.contact:hover,.contact.active{background:var(--hover)}
.contactPic{width:48px;height:48px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;overflow:hidden;position:relative}
.onlineDot{position:absolute;bottom:0;right:0;width:12px;height:12px;border-radius:50%;background:var(--green);border:2px solid var(--sidebar)}
.contactInfo{flex:1;overflow:hidden}
.contactName{font-weight:600;margin-bottom:4px}
.contactLast{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.moneyBox{padding:12px;margin:12px;background:var(--panel);border-radius:8px;text-align:center}
.moneyBox h4{color:var(--green);font-size:14px;margin-bottom:4px}

/* ====== CHAT AREA ====== */
.chat{display:flex;flex-direction:column;background:var(--bg)}
.chatHead{padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chatHead .contactPic{width:40px;height:40px}
.chatName{font-weight:600}
.chatStatus{font-size:12px;color:var(--text2)}
.messages{flex:1;overflow-y:auto;padding:20px;background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" opacity="0.03"><text x="10" y="50" font-size="20">💬</text></svg>')}
.msgRow{display:flex;margin-bottom:12px}
.msgRow.me{justify-content:flex-end}
.msgBubble{max-width:65%;padding:8px 12px;border-radius:8px;background:var(--panel);position:relative;font-size:14px;line-height:19px}
.msgRow.me .msgBubble{background:#005c4b;color:#fff}
.msgTime{font-size:11px;color:var(--text2);margin-top:4px;text-align:right}
.inputArea{padding:10px 16px;background:var(--panel);display:flex;gap:8px;align-items:center}
.inputArea input{flex:1;padding:12px 16px;background:var(--bg);border:none;border-radius:8px;color:var(--text);outline:none;font-size:15px}
.sendBtn{width:48px;height:48px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:20px;cursor:pointer}

/* ====== SETTINGS MODAL ====== */
#settingsModal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:2000}
#settingsBox{background:var(--panel);width:90%;max-width:400px;border-radius:12px;padding:20px}
#settingsBox h3{margin-bottom:16px}
.setItem{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.setItem select{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:8px;border-radius:6px}
.closeSet{width:100%;padding:12px;margin-top:16px;background:var(--green);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<!-- 1. LOGIN - USERNAME ONLY -->
<div id="login">
<div id="loginBox">
<h1>💬 Khamchat</h1>
<input type="text" id="username" placeholder="Enter username">
<button onclick="joinChat()">Start Chatting</button>
</div>
</div>

<!-- 2. APP -->
<div id="app">
<!-- SIDEBAR -->
<div class="sidebar">
<div class="sideHead">
<div class="profilePic" onclick="changePic()">
<img id="myPic" src="" style="display:none">
<span id="myPicText">A</span>
</div>
<div class="sideActions">
<span onclick="openSettings()">⚙️</span>
</div>
</div>
<div class="search"><input type="text" id="search" placeholder="Search or start new chat"></div>
<div class="moneyBox">
<h4>💰 Earned Money</h4>
<div id="balance">$0.00</div>
<input type="text" id="monetagKey" placeholder="Paste Monetag Key" style="width:100%;margin-top:8px;padding:6px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text)">
<button onclick="saveKey()" style="width:100%;margin-top:6px;padding:6px;background:var(--green);border:none;border-radius:6px;color:#fff;cursor:pointer">Save Key</button>
</div>
<div class="contactsList" id="contactsList"></div>
</div>

<!-- CHAT -->
<div class="chat">
<div class="chatHead">
<div class="contactPic"><span id="chatPic">🤖</span></div>
<div>
<div class="chatName" id="chatName">Aboki AI</div>
<div class="chatStatus">Online</div>
</div>
</div>
<div class="messages" id="messages">
<div style="text-align:center;color:var(--text2);margin-top:40px">Select a contact to start chatting</div>
</div>
<div class="inputArea">
<input type="text" id="inp" placeholder="Type a message" onkeyup="if(event.key==='Enter') sendMsg()">
<button class="sendBtn" onclick="sendMsg()">➤</button>
</div>
</div>
</div>

<!-- SETTINGS -->
<div id="settingsModal">
<div id="settingsBox">
<h3>Settings</h3>
<div class="setItem">
<span>Language / Harshe</span>
<select id="lang" onchange="changeLang()">
<option value="en">English</option>
<option value="ha">Hausa</option>
</select>
</div>
<div class="setItem">
<span>Mode / Yanayi</span>
<select id="theme" onchange="changeTheme()">
<option value="dark">Dark</option>
<option value="light">Light</option>
<option value="auto">System / Na Asali</option>
</select>
</div>
<button class="closeSet" onclick="closeSettings()">Close / Rufe</button>
</div>
</div>

<input type="file" id="picInput" accept="image/*" style="display:none">

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

const firebaseConfig = {
  apiKey: "AIzaSyAsFeKfeYTIGzP221hwPlFBHPiYyy-TLqE",
  authDomain: "khamchat-1d5a4.firebaseapp.com",
  projectId: "khamchat-1d5a4",
  storageBucket: "khamchat-1d5a4.firebasestorage.app",
  messagingSenderId: "515176934851",
  appId: "1:515176934851:web:4ec261196d1ff497666176"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;
let currentChatId = null;
let myUsername = '';
let lang = 'en';
let balance = 0.00;

// ====== 1. LOGIN - USERNAME ONLY, BABU HANABA ======
window.joinChat = async () => {
myUsername = document.getElementById('username').value.trim();
if(!myUsername) return alert(lang==='ha'?'Saka username':'Enter username');
await signInAnonymously(auth); // Anonymous = ba zai neman email ba
currentUser = auth.currentUser;
await setDoc(doc(db, 'users', currentUser.uid), {
username: myUsername, 
online: true,
pic: '',
monetagKey: '',
balance: 0
});
document.getElementById('myPicText').innerText = myUsername.charAt(0).toUpperCase();
document.getElementById('login').style.display = 'none';
document.getElementById('app').style.display = 'grid';
loadContacts();
openChat('Aboki AI', 'bot');
}

// ====== 2. CONTACTS LIST + PROFILE PIC ======
async function loadContacts(){
const q = query(collection(db, 'users'), where('__name__','!=',currentUser.uid));
onSnapshot(q, (snap) => {
let html = `<div class="contact active" onclick="openChat('Aboki AI','bot')">
<div class="contactPic">🤖<span class="onlineDot"></span></div>
<div class="contactInfo">
<div class="contactName">Aboki AI</div>
<div class="contactLast">${lang==='ha'?'AI Mai Taimako':'AI Assistant'}</div>
</div>
</div>`;
snap.forEach(d=>{
const u=d.data();
html+=`<div class="contact" onclick="openChat('${u.username}','${d.id}','${u.pic||''}')">
<div class="contactPic">${u.pic?`<img src="${u.pic}">`:`${u.username.charAt(0).toUpperCase()}`}<span class="onlineDot"></span></div>
<div class="contactInfo">
<div class="contactName">@${u.username}</div>
<div class="contactLast">Online</div>
</div>
</div>`;
});
document.getElementById('contactsList').innerHTML=html;
});

// Load my data
const myDoc = await getDoc(doc(db,'users',currentUser.uid));
if(myDoc.exists()){
balance = myDoc.data().balance || 0;
document.getElementById('balance').innerText = `$${balance.toFixed(2)}`;
if(myDoc.data().pic){
document.getElementById('myPic').src = myDoc.data().pic;
document.getElementById('myPic').style.display = 'block';
document.getElementById('myPicText').style.display = 'none';
}
}

// CHANGE PROFILE PIC
window.changePic = () => document.getElementById('picInput').click();
document.getElementById('picInput').onchange = async (e) => {
const file = e.target.files[0]; if(!file) return;
const sRef = ref(storage, `pics/${currentUser.uid}.jpg`);
await uploadBytes(sRef, file);
const url = await getDownloadURL(sRef);
await setDoc(doc(db,'users',currentUser.uid), {pic: url}, {merge: true});
document.getElementById('myPic').src = url;
document.getElementById('myPic').style.display = 'block';
document.getElementById('myPicText').style.display = 'none';
}

// ====== 3. REAL-TIME CHAT ======
window.openChat = (name,uid,pic='') => {
currentChatId = uid==='bot' ? 'bot' : [currentUser.uid,uid].sort().join('_');
document.getElementById('chatName').innerText = name;
document.getElementById('chatPic').innerHTML = pic ? `<img src="${pic}">` : name.charAt(0).toUpperCase();
if(uid==='bot'){
document.getElementById('messages').innerHTML = `<div class="msgRow"><div class="msgBubble">${lang==='ha'?`Sannu @${myUsername}!`:`Hello @${myUsername}!`}<div class="msgTime">Now</div></div></div>`;
}
const q = query(collection(db,'chats',currentChatId,'messages'), orderBy('timestamp'));
onSnapshot(q, (snap) => {
let html = '';
snap.forEach(d=>{
const m = d.data();
const isMe = m.sender === currentUser.uid;
html += `<div class="msgRow ${isMe?'me':''}"><div class="msgBubble">${m.text}<div class="msgTime">Now</div></div></div>`;
});
document.getElementById('messages').innerHTML = html;
document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
});
}

window.sendMsg = async () => {
const inp = document.getElementById('inp');
const text = inp.value.trim();
if(!text) return;
if(currentChatId === 'bot'){
document.getElementById('messages').innerHTML += `<div class="msgRow me"><div class="msgBubble">${text}<div class="msgTime">Now</div></div></div>`;
setTimeout(()=>{
let reply = lang==='ha'? `Na karba: ${text}` : `Got it: ${text}`;
document.getElementById('messages').innerHTML += `<div class="msgRow"><div class="msgBubble">${reply}<div class="msgTime">Now</div></div></div>`;
balance += 0.01; // Earned money
document.getElementById('balance').innerText = `$${balance.toFixed(2)}`;
setDoc(doc(db,'users',currentUser.uid), {balance}, {merge: true});
},400);
}else{
await addDoc(collection(db,'chats',currentChatId,'messages'), {
text, sender: currentUser.uid, timestamp: serverTimestamp()
});
}
inp.value = '';
}

// ====== 4. MONETAG KEY ======
window.saveKey = async () => {
const key = document.getElementById('monetagKey').value.trim();
if(!key) return alert('Paste key first');
await setDoc(doc(db,'users',currentUser.uid), {monetagKey: key}, {merge: true});
alert(lang==='ha'?'An ajiye key':'Key saved');
}

// ====== 5. SETTINGS ======
window.openSettings = () => document.getElementById('settingsModal').style.display = 'flex';
window.closeSettings = () => document.getElementById('settingsModal').style.display = 'none';
window.changeLang = () => {
lang = document.getElementById('lang').value;
document.getElementById('inp').placeholder = lang==='ha'?'Rubuta sako...':'Type a message';
document.getElementById('search').placeholder = lang==='ha'?'Bincika...':'Search or start new chat';
loadContacts(); // Refresh names
}
window.changeTheme = () => {
const m = document.getElementById('theme').value;
if(m==='light') document.body.classList.add('light');
else if(m==='dark') document.body.classList.remove('light');
else document.body.classList.toggle('light', window.matchMedia('(prefers-color-scheme: light)').matches);
}
</script>
</body>
</html>
