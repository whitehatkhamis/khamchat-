<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aboki AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a24;--hover:#1f1f2b;--border:#22222e;
--accent:#7c3aed;--gradient:linear-gradient(135deg,#7c3aed 0%,#a855f7 50%,#ec4899 100%);
--text:#f4f4f5;--text2:#a1a1aa;--green:#22c55e;--blue:#3b82f6;
--me:linear-gradient(135deg,#7c3aed,#a855f7);--other:#1e1e2a;
}
body.light{--bg:#ffffff;--bg2:#f8fafc;--bg3:#f1f5f9;--hover:#e2e8f0;--border:#e2e8f0;--text:#0f172a;--text2:#64748b;--other:#f1f5f9}
html,body{background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;display:flex;width:100%}

/* Login Screen */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
#loginBox{background:var(--bg2);padding:40px;border-radius:20px;border:1px solid var(--border);width:90%;max-width:380px;text-align:center}
#loginBox h1{font-size:36px;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
#loginBox p{color:var(--text2);margin-bottom:20px;font-size:14px}
#loginBox input{width:100%;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;margin-bottom:12px}
#loginBox button{width:100%;padding:14px;background:var(--gradient);border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer;font-size:16px}

/* Layout */
#app{display:none;width:100%;height:100vh;height:100dvh}
#side{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px}
.profile{display:flex;align-items:center;gap:12px;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:20px}
.profile img{width:50px;height:50px;border-radius:50%;background:var(--gradient)}
.profile div h3{font-size:16px;margin-bottom:3px}
.profile div p{font-size:12px;color:var(--text2)}

.menu{display:flex;flex-direction:column;gap:4px}
.item{padding:12px;display:flex;align-items:center;gap:12px;border-radius:10px;cursor:pointer;color:var(--text2);font-size:15px}
.item:hover,.item.active{background:var(--hover);color:var(--text)}
.item svg{width:20px;height:20px}

.footer{margin-top:auto;padding-top:20px;border-top:1px solid var(--border)}
.pro{background:var(--bg3);padding:16px;border-radius:12px;text-align:center}
.pro h4{font-size:14px;color:#fbbf24;margin-bottom:8px}
.pro p{font-size:12px;color:var(--text2);margin-bottom:12px}
.pro button{width:100%;padding:10px;background:var(--gradient);border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:13px}

/* Contacts */
#contacts{width:360px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column}
.head{padding:24px;background:var(--bg2);border-bottom:1px solid var(--border)}
.headTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.headTop h2{font-size:24px;font-weight:700}
.add{width:36px;height:36px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:20px;cursor:pointer}
.search{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;margin-bottom:16px}
.search input{flex:1;background:transparent;border:none;color:var(--text);outline:none;font-size:16px}
.filters{display:flex;gap:8px}
.fbtn{padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--text2);cursor:pointer}
.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.list{flex:1;overflow-y:auto;padding:8px}
.person{padding:12px;display:flex;gap:12px;border-radius:12px;cursor:pointer}
.person:hover{background:var(--hover)}
.avatar{width:48px;height:48px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:700;position:relative;font-size:18px}
.avatar.on::after{content:'';position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:var(--green);border:2px solid var(--bg);border-radius:50%}
.info{flex:1;overflow:hidden}
.top{display:flex;justify-content:space-between;margin-bottom:4px}
.name{font-size:15px;font-weight:600}
.time{font-size:12px;color:var(--text2)}
.msg{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{width:20px;height:20px;background:var(--accent);border-radius:50%;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:600}

/* Chat - FULL SCREEN */
#chat{flex:1;display:none;flex-direction:column;background:var(--bg);width:100%}
.chatHead{padding:16px 24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.backBtn{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px}
.chatInfo{flex:1}
.chatName{font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px}
.tick{color:var(--blue)}
.status{font-size:12px;color:var(--green);display:flex;align-items:center;gap:4px}
.status::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%}
.icons{display:flex;gap:8px}
.icons button{width:36px;height:36px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.icons button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

.msgs{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
.date{text-align:center;color:var(--text2);font-size:13px;margin:20px 0}
.row{display:flex;gap:10px;margin:12px 0}
.row.me{justify-content:flex-end}
.bubble{max-width:65%;padding:12px 16px;border-radius:18px}
.row.other.bubble{background:var(--other);border-bottom-left-radius:4px}
.row.me.bubble{background:var(--me);color:#fff;border-bottom-right-radius:4px}
.btext{font-size:15px;line-height:22px;word-wrap:break-word}
.btime{font-size:11px;color:var(--text2);margin-top:4px;display:flex;gap:4px}
.row.me.btime{justify-content:flex-end}

.input{padding:16px 24px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
.attach{display:flex;gap:8px}
.attach button{width:40px;height:40px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.input input{flex:1;padding:14px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:24px;color:var(--text);font-size:16px;outline:none}
.send{width:48px;height:48px;border-radius:50%;background:var(--gradient);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* AI Modal Fullscreen */
#ai{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:200}
.aiHead{padding:20px 24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.aiHead h3{flex:1;text-align:center;font-size:18px;font-weight:700}
.aiHead button{background:none;border:none;color:var(--text2);font-size:28px;cursor:pointer}
.aiMsgs{flex:1;overflow-y:auto;padding:24px}
.aiInput{padding:16px 24px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:10px}

/* Settings Modal */
#set{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(5px)}
#setBox{background:var(--bg2);padding:28px;border-radius:20px;border:1px solid var(--border);width:90%;max-width:380px}
#setBox h3{color:var(--accent);font-size:20px;margin-bottom:20px}
#setBox label{display:block;margin-top:16px;margin-bottom:8px;color:var(--text2);font-size:13px;font-weight:600}
#setBox select{width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px}
#setBox button{width:100%;padding:14px;background:var(--gradient);border:none;border-radius:12px;color:#fff;font-weight:700;margin-top:20px;cursor:pointer;font-size:16px}

/* MOBILE FULL SCREEN FIX */
@media(max-width:768px){
html,body{height:100vh;height:100dvh;overflow:hidden}
#app{height:100vh;height:100dvh}
#side{position:fixed;bottom:0;left:0;width:100%;height:70px;flex-direction:row;padding:8px 0;border-right:none;border-top:1px solid var(--border);z-index:100;background:var(--bg2)}
.profile{display:none}
.menu{flex-direction:row;width:100%;justify-content:space-around}
.item{flex-direction:column;font-size:10px;gap:4px;padding:6px 4px}
.item svg{width:20px;height:20px}
.footer{display:none}
#contacts{width:100%;height:calc(100vh - 70px);height:calc(100dvh - 70px);border-right:none;padding-bottom:0}
#chat{width:100%;height:calc(100vh - 70px);height:calc(100dvh - 70px);padding-bottom:0}
#chat.fullscreen{position:fixed;top:0;left:0;width:100%;height:100vh;height:100dvh;z-index:150}
.backBtn{display:block!important}
.chatHead{padding:12px 16px}
.msgs{padding:16px 12px}
.bubble{max-width:78%;padding:10px 14px;font-size:15px;border-radius:16px}
.btext{font-size:15px;line-height:21px}
.input{padding:10px 12px;gap:8px}
.attach button{width:38px;height:38px}
.input input{padding:12px 16px;font-size:16px;border-radius:20px}
.send{width:44px;height:44px}
</style>
</head>

<!-- Contacts -->

<script>
let user = '';
let currentChat = 'Khamis AI';

function start(){
user = document.getElementById('uname').value.trim();
if(user.length < 2) return alert('Please enter a name with 2 or more letters');
localStorage.setItem('aboki_user', user);
document.getElementById('sname').innerText = user;
document.getElementById('uname2').innerText = user;
document.getElementById('login').style.display = 'none';
document.getElementById('app').style.display = 'flex';
loadList();
openChat('Khamis AI');
}

window.onload = () => {
const saved = localStorage.getItem('aboki_user');
if(saved){
user = saved;
document.getElementById('sname').innerText = user;
document.getElementById('uname2').innerText = user;
document.getElementById('login').style.display = 'none';
document.getElementById('app').style.display = 'flex';

}

function loadList(){
const data = [
{name:'Khamis AI', msg:'Hello! I am here to help you', time:'10:30 AM', on:true, badge:2},
{name:'Hafsa Usman', msg:'Thank you so much', time:'9:45 AM', on:true, badge:0},
{name:'Ibrahim Lawal', msg:'See you tomorrow', time:'8:20 AM', on:false, badge:0},
{name:'Maryam Musa', msg:'Okay, I understand', time:'Yesterday', on:true, badge:0},
{name:'Sani Abba', msg:'Thanks', time:'Yesterday', on:false, badge:1}
];
let html = '';
data.forEach(p => {
html += `<div class="person" onclick="openChat('${p.name}')"><div class="avatar ${p.on?'on':''}">${p.name.charAt(0)}</div><div class="info"><div class="top"><div class="name">${p.name}</div><div class="time">${p.time}</div></div><div class="top"><div class="msg">${p.msg}</div>${p.badge>0?`<div class="badge">${p.badge}</div>`:''}</div></div></div>`;
});
document.getElementById('list').innerHTML = html;
}

function openChat(name){
currentChat = name;
document.getElementById('cname').innerHTML = name + ' <span class="tick">✓</span>';
document.getElementById('cavatar').innerText = name.charAt(0);
document.getElementById('contacts').style.display = 'none';
document.getElementById('chat').style.display = 'flex';
document.getElementById('chat').classList.add('fullscreen');

if(name === 'Khamis AI'){
document.getElementById('msgs').innerHTML = `<div class="date">Today</div><div class="row other"><div class="avatar">AI</div><div class="bubble"><div class="btext">Hello ${user}! I am Khamis AI. How can I help you today?</div><div class="btime">10:30 AM</div></div></div>`;
} else {
document.getElementById('msgs').innerHTML = `<div class="date">Today</div>`;
}
}

function showChat(){
document.querySelectorAll('.item').forEach(i=>i.classList.remove('active'));
document.querySelector('.item[onclick="showChat()"]').classList.add('active');
document.getElementById('chat').style.display='none';
document.getElementById('contacts').style.display='flex';
document.getElementById('chat').classList.remove('fullscreen');
}

function showContacts(){
document.querySelectorAll('.item').forEach(i=>i.classList.remove('active'));
document.querySelector('.item[onclick="showContacts()"]').classList.add('active');
}

function back(){
document.getElementById('chat').classList.remove('fullscreen');
document.getElementById('chat').style.display='none';
document.getElementById('contacts').style.display='flex';
}

function send(){
const inp = document.getElementById('inp');
const text = inp.value.trim();
if(!text) return;
document.getElementById('msgs').innerHTML += `<div class="row me"><div class="bubble"><div class="btext">${text}</div><div class="btime">10:31 AM ✓✓</div></div></div>`;
inp.value = '';
document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
}

function setFilter(btn){
document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

function openAI(){document.getElementById('ai').style.display='flex'}
function closeAI(){document.getElementById('ai').style.display='none'}
function sendAI(){
const inp = document.getElementById('aiInp');

document.getElementById('aiMsgs').innerHTML += `<div class="row me"><div class="bubble"><div class="btext">${text}</div></div></div>`;

function clearAI(){
document.getElementById('aiMsgs').innerHTML = `<div style="text-align:center;color:var(--text2);margin-top:100px;font-size:20px">Good morning, ${user}</div><div style="text-align:center;color:var(--text2);margin-top:12px">Ask Khamis AI anything...</div>`;
}

function openSet(){
document.getElementById('set').style.display = 'flex';
}

function closeSet(){
document.getElementById('set').style.display = 'none';
}

function changeTheme(){
const t = document.getElementById('theme').value;
if(t==='light') document.body.classList.add('light');
else if(t==='dark') document.body.classList.remove('light');
else if(window.matchMedia('(prefers-color-scheme: light)').matches) document.body.classList.add('light');
else document.body.classList.remove('light');
localStorage.setItem('theme', t);
}

function changeLang(){
const l = document.getElementById('lang').value;
localStorage.setItem('lang', l);
alert('Language set to '+l+'. Firebase will save this setting.');
}
