<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khamchat Reel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
:root{
--bg:#0a0a0f;--sidebar:#111119;--panel:#1a1a24;--hover:#222232;--border:#25253a;
--gradient:linear-gradient(135deg,#7c3aed 0%,#a855f7 100%);
--me:linear-gradient(135deg,#7c3aed,#a855f7);
--text:#ffffff;--text2:#8b8ba7;--green:#22c55e;--blue:#3b82f6;--purple:#a855f7;
}
body.light{
--bg:#f5f7fb;--sidebar:#ffffff;--panel:#ffffff;--hover:#f1f5f9;--border:#e2e8f0;
--text:#0f172a;--text2:#64748b;
}
html,body{background:var(--bg);color:var(--text);width:100vw;height:100vh;overflow:hidden}
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
#loginBox{background:var(--panel);padding:40px;border-radius:24px;border:1px solid var(--border);width:90%;max-width:380px;text-align:center}
#loginBox .botIcon{width:80px;height:80px;margin:0 auto 16px;border-radius:24px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:40px}
#loginBox h1{font-size:28px;font-weight:800;margin-bottom:8px}
#loginBox input{width:100%;padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;margin-bottom:12px;outline:none}
#loginBox button{width:100%;padding:14px;background:var(--gradient);border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer;font-size:15px}
#app{display:none;width:100vw;height:100vh;grid-template-columns:280px 320px 1fr}
.sidebar{background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px}
.botIconLg{width:80px;height:80px;margin:0 auto 12px;border-radius:24px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:40px}
.navItem{padding:12px 16px;border-radius:12px;display:flex;align-items:center;gap:12px;cursor:pointer;color:var(--text2);font-weight:600;margin-bottom:4px}
.navItem.active,.navItem:hover{background:var(--hover);color:var(--text)}
.userCard{padding:12px;background:var(--panel);border-radius:16px;border:1px solid var(--border);display:flex;gap:12px;align-items:center;margin-top:auto}
.userAvatar{width:48px;height:48px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:700}
.userStatus{font-size:12px;color:var(--green);display:flex;align-items:center;gap:6px}
.userStatus::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--green)}
.contacts{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column}
.contactsHead{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.searchBox{padding:16px 20px;position:relative}
.searchBox input{width:100%;padding:12px 16px 12px 42px;background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;outline:none}
.searchBox::before{content:'🔍';position:absolute;left:32px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text2)}
.list{flex:1;overflow-y:auto;padding:8px}
.contact{padding:12px;border-radius:12px;display:flex;gap:12px;cursor:pointer}
.contact:hover,.contact.active{background:var(--hover)}
.contactAvatar{width:50px;height:50px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:700;position:relative}
.onlineDot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2px solid var(--panel)}
.chat{display:flex;flex-direction:column;background:var(--bg)}
.chatHead{padding:16px 20px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chatAvatar{width:44px;height:44px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:24px;position:relative}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msgRow{display:flex;gap:10px}
.msgRow.me{justify-content:flex-end}
.msgBubble{max-width:60%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:20px}
.msgRow.other .msgBubble{background:var(--panel);border-bottom-left-radius:4px}
.msgRow.me .msgBubble{background:var(--me);color:#fff;border-bottom-right-radius:4px}
.inputBar{padding:16px 20px;background:var(--panel);border-top:1px solid var(--border);display:flex;gap:12px;align-items:center}
.inputWrap{flex:1;display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:24px;padding:0 16px}
.inputWrap input{flex:1;padding:12px 8px;background:transparent;border:none;color:var(--text);font-size:14px;outline:none}
.sendBtn{width:46px;height:46px;border-radius:50%;background:var(--gradient);border:none;color:#fff;cursor:pointer;font-size:20px}
#settingsModal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:500}
#settingsBox{background:var(--panel);width:90%;max-width:500px;border-radius:24px;border:1px solid var(--border);padding:20px}
.settingItem{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
select{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:8px}
@media(max-width:1024px){.sidebar{display:none}#app{grid-template-columns:320px 1fr}}
@media(max-width:768px){#app{grid-template-columns:1fr}.contacts{display:none}#app.show-chat .chat{display:flex}#app.show-chat .contacts{display:none}}
.chat{display:flex}
</style>
</head>
<body>

<div id="login">
<div id="loginBox">
<div class="botIcon">🤖</div>
<h1>Aboki AI</h1>
<input type="text" id="username" placeholder="Enter username">
<button onclick="joinChat()">Join Chat</button>
</div>
</div>

<div id="app">
<div class="sidebar">
<div style="text-align:center;margin-bottom:24px">
<div class="botIconLg">🤖</div>
<h2>Aboki AI</h2>
</div>
<div>
<div class="navItem active">💬 Chats</div>
<div class="navItem" onclick="openSettings()">⚙️ Settings</div>
</div>
<div class="userCard">
<div class="userAvatar" id="myAvatar">A</div>
<div><div id="myName">User</div><div class="userStatus">Online</div></div>
</div>
</div>

<div class="contacts">
<div class="contactsHead"><h2>Contacts</h2></div>
<div class="searchBox"><input type="text" id="search" placeholder="Search contacts..." onkeyup="searchContacts()"></div>
<div class="list" id="contactsList"></div>
</div>

<div class="chat">
<div class="chatHead">
<div class="chatAvatar">🤖<span class="onlineDot"></span></div>
<div><div>Aboki AI ✓</div><div style="font-size:12px;color:var(--green)">Online</div></div>
</div>
<div class="msgs" id="msgs"><div style="text-align:center;color:var(--text2)">Today</div></div>
<div class="inputBar">
<div class="inputWrap">
<button onclick="document.getElementById('fileInput').click()">📎</button>
<button onclick="toggleRecording()" id="recBtn">🎤</button>
<input type="text" id="inp" placeholder="Type your message..." onkeyup="if(event.key==='Enter') sendMessage()">
</div>
<button class="sendBtn" onclick="sendMessage()">➤</button>
</div>
</div>
</div>

<div id="settingsModal">
<div id="settingsBox">
<h3 style="margin-bottom:16px">Settings</h3>
<div class="settingItem">
<span>Theme</span>
<select id="themeMode" onchange="changeTheme()">
<option value="dark">Dark</option>
<option value="light">Light</option>
<option value="auto">System</option>
</select>
</div>
<div class="settingItem">
<span>Language</span>
<select id="langMode" onchange="changeLang()">
<option value="en">English</option>
<option value="ha">Hausa</option>
</select>
</div>
<button onclick="closeSettings()" style="width:100%;padding:12px;margin-top:16px;background:var(--gradient);border:none;border-radius:12px;color:#fff">Close</button>
</div>
</div>

<input type="file" id="fileInput" accept="image/*,video/*">

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

const firebaseConfig = {
  apiKey: "AIzaSyAsFeKfeYTIGzP221hwPlFBHPiYyy-TLqE",
  authDomain: "khamchat-1d5a4.firebaseapp.com",
  projectId: "khamchat-1d5a4",
  storageBucket: "khamchat-1d5a4.firebasestorage.app",
  messagingSenderId: "515176934851",
  appId: "1:515176934851:web:4ec261196d1ff497666176"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;
let currentChatId = null;
let myUsername = '';
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let lang = 'en';

window.joinChat = async () => {
myUsername = document.getElementById('username').value.trim();
if(!myUsername) return alert('Enter username');
try{
await signInAnonymously(auth);
const user = auth.currentUser;
currentUser = user;
await setDoc(doc(db, 'users', user.uid), {username: myUsername, online: true});
document.getElementById('myName').innerText = myUsername;
document.getElementById('myAvatar').innerText = myUsername.charAt(0).toUpperCase();
document.getElementById('login').style.display = 'none';
document.getElementById('app').style.display = 'grid';
loadContacts();
openChat('Aboki AI','bot');
}catch(e){alert('Error: '+e.message)}
}

async function loadContacts(){
const q = query(collection(db, 'users'), where('__name__','!=',currentUser.uid));
onSnapshot(q, (snap) => {
let html = `<div class="contact active" onclick="openChat('Aboki AI','bot')">
<div class="contactAvatar">🤖<span class="onlineDot"></span></div>
<div><div>Aboki AI</div><div style="font-size:12px;color:var(--text2)">AI Assistant</div></div>
</div>`;
snap.forEach(d=>{
const u=d.data();
html+=`<div class="contact" onclick="openChat('${u.username}','${d.id}')">
<div class="contactAvatar">${u.username.charAt(0).toUpperCase()}<span class="onlineDot"></span></div>
<div><div>@${u.username}</div><div style="font-size:12px;color:var(--text2)">Online</div></div>
</div>`;
});
document.getElementById('contactsList').innerHTML=html;
});
}

window.searchContacts = () => {
const v=document.getElementById('search').value.toLowerCase();
document.querySelectorAll('.contact').forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?'flex':'none';
});
}

window.openChat = (name,uid)=>{
currentChatId=uid==='bot'?'bot':[currentUser.uid,uid].sort().join('_');
if(window.innerWidth<768){document.getElementById('app').classList.add('show-chat')}
if(uid==='bot'){
document.getElementById('msgs').innerHTML=`<div style="text-align:center;color:var(--text2)">Today</div>
<div class="msgRow other"><div class="msgBubble">Hello @${myUsername}! I am Aboki AI 🤖</div></div>`;
}
const q=query(collection(db,'chats',currentChatId,'messages'),orderBy('timestamp'));
onSnapshot(q,(snap)=>{
let html='<div style="text-align:center;color:var(--text2)">Today</div>';
snap.forEach(d=>{
const m=d.data();const isMe=m.sender===currentUser.uid;
let content=m.type==='text'?m.text:m.type==='audio'?'<audio controls src="'+m.url+'"></audio>':'📎 '+m.fileName;
html+=`<div class="msgRow ${isMe?'me':'other'}"><div class="msgBubble">${content}</div></div>`;
});
document.getElementById('msgs').innerHTML=html;
document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
});
}

window.sendMessage = async ()=>{
const inp=document.getElementById('inp');const text=inp.value.trim();if(!text)return;
if(currentChatId==='bot'){
document.getElementById('msgs').innerHTML+=`<div class="msgRow me"><div class="msgBubble">${text}</div></div>`;
setTimeout(()=>{
let reply = lang==='ha'? `Na gane: ${text}` : `I got: ${text}`;
document.getElementById('msgs').innerHTML+=`<div class="msgRow other"><div class="msgBubble">${reply}</div></div>`;
},500);
}else{
await addDoc(collection(db,'chats',currentChatId,'messages'),{text,type:'text',sender:currentUser.uid,timestamp:serverTimestamp()});
}
inp.value='';
}

window.toggleRecording=async()=>{
const btn=document.getElementById('recBtn');
if(!isRecording){
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
mediaRecorder=new MediaRecorder(stream);audioChunks=[];
mediaRecorder.onstop=async()=>{
const blob=new Blob(audioChunks,{type:'audio/webm'});
const sRef=ref(storage,`audio/${currentChatId}/${Date.now()}.webm`);
await uploadBytes(sRef,blob);const url=await getDownloadURL(sRef);
await addDoc(collection(db,'chats',currentChatId,'messages'),{type:'audio',url,sender:currentUser.uid,timestamp:serverTimestamp()});
};
mediaRecorder.start();isRecording=true;btn.innerText='⏹️';
}else{mediaRecorder.stop();isRecording=false;btn.innerText='🎤';}
}

document.getElementById('fileInput').onchange=async(e)=>{
const file=e.target.files[0];if(!file)return;
const sRef=ref(storage,`files/${currentChatId}/${Date.now()}_${file.name}`);
await uploadBytes(sRef,file);const url=await getDownloadURL(sRef);
await addDoc(collection(db,'chats',currentChatId,'messages'),{type:'file',url,fileName:file.name,sender:currentUser.uid,timestamp:serverTimestamp()});
}

window.openSettings=()=>document.getElementById('settingsModal').style.display='flex';
window.closeSettings=()=>document.getElementById('settingsModal').style.display='none';
window.changeTheme=()=>{
const m=document.getElementById('themeMode').value;
if(m==='light')document.body.classList.add('light');
else if(m==='dark')document.body.classList.remove('light');
else document.body.classList.toggle('light',window.matchMedia('(prefers-color-scheme: light)').matches);
}
window.changeLang=()=>{
lang=document.getElementById('langMode').value;
document.getElementById('inp').placeholder=lang==='ha'?'Rubuta...':'Type your message...';
}
</script>
</body>
</html>
